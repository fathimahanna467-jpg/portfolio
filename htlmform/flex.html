<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Course Flexbox</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .container{
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 20px;
            width: 80%;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .box{
            width: 150px;
            height: 150px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        .html{
            background-color: #E44D26;
        }

        .css{
            background-color: #264DE4;
        }

        .javascript{
            background-color: #F0DB4F;
            color: black;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box html">HTML</div>
        <div class="box css">CSS</div>
        <div class="box javascript">JavaScript</div>
    </div>

</body>
</html>
