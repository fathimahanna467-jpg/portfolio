<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

    <h2>Student Registration Form</h2>

    <form>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="Fathima Hanna"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="fathimahanna467@gmail.com"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" value="87654321"><br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br><br>

        <label>Hobbies:</label>
        <input type="checkbox" id="reading" name="hobby" value="Reading">
        <label for="reading">Reading</label>

        <input type="checkbox" id="sports" name="hobby" value="Sports">
        <label for="sports">Sports</label><br><br>

        <label for="department">Department:</label>
        <select id="department" name="department">
            <option>IT</option>
            <option>CSE</option>
            <option>ECE</option>
        </select><br><br>

        <label for="address">Address:</label><br>
        <textarea id="address" rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
